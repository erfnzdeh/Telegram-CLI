# Autoforward: relay messages from one channel to another
[[jobs]]
name = "news-forward"
type = "autoforward"
account = "main"
source = "@source_channel"
destinations = ["@my_archive", "@friend"]
drop_author = true
transforms = ["strip_formatting", "add_prefix:prefix=[NEWS]"]

[jobs.filters]
types = ["text", "photo"]
contains = ["breaking"]

# Autoforward with per-destination transforms
[[jobs]]
name = "cleaned-forward"
type = "autoforward"
account = "main"
source = "@raw_feed"
drop_author = true

[[jobs.destinations]]
chat = "@clean_feed"

[[jobs.destinations.transforms]]
type = "regex"
pattern = "sponsor"
replacement = ""
flags = "i"

# Auto-reply: respond to incoming messages with a static message
[[jobs]]
name = "away-reply"
type = "autoreply"
account = "main"
chats = ["*"]  # all chats, or list specific ones
reply = "Away until Monday. Will respond when I'm back."

[jobs.filters]
after = "2025-03-01"
before = "2025-03-10"
